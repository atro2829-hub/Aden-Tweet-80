name: Build AdenTweet APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - run: chmod +x gradlew
      - name: Create google-services.json
        run: printf '%s' "${{ secrets.GOOGLE_SERVICES_JSON }}" > app/google-services.json
      - name: Create keystore
        run: printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/adentweet-release.jks
      - name: Build Debug
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - name: Build Release
        run: ./gradlew assembleRelease --stacktrace --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: AdenTweet-debug
          path: app/build/outputs/apk/debug/*.apk
      - uses: actions/upload-artifact@v4
        with:
          name: AdenTweet-release
          path: app/build/outputs/apk/release/*.apk
